<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CP-RED ロール別ライフパスジェネレーター</title>
    <style>
        body {

            color: #00ff66;

            padding: 20px;
        }
        h1, h2 {
            color: #0055ff;
            border-bottom: 2px solid #0055ff;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h2.conditional-header {
            color: #ff0055;
            border-bottom-color: #ff0055;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #262626;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.3);
        }
        .control-panel {
            margin-bottom: 20px;
            padding: 15px;
            background: #111;
            border: 1px solid #0055ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        button {
            background-color: #0055ff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #3377ff;
        }
        .mini-roll-btn {
            background-color: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        .mini-roll-btn:hover {
            background-color: rgba(0, 255, 102, 0.2);
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
        .block {
            background: #1a1a1a;
            padding: 15px;
            border: 1px solid #444;
        }
        .conditional-block {
            border: 1px dashed #ff0055;
            background: #221115;
        }
        .lp-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
            padding: 10px;
            background: #222;
            border-left: 3px solid #0055ff;
        }
        .lp-row.conditional-row {
            border-left-color: #ff0055;
        }
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .item-label {
            font-size: 13px;
            color: #aaa;
            font-weight: bold;
        }
        select {
            padding: 6px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
        }
        .hidden {
            display: none !important;
        }
        .output-box {
            width: 100%;
            height: 180px;
            background: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            margin-top: 10px;
            box-sizing: border-box;
            padding: 12px;
            font-size: 14px;
            line-height: 1.6;
            resize: none;

</head>
<body>

<div class="container">
    <h1>CYBERPUNK RED: LIFEPATH GENERATOR</h1>
    
    <div class="control-panel">
        <div>

           </select>

            <div class="lp-row" id="row-q3"><div class="row-header"><span class="item-label" id="lbl-q3">質問3</span><button class="mini-roll-btn" onclick="rollSingle('q3')">🎲 Roll</button></div><select id="sel-q3" onchange="handleMainChange()"></select></div>

        </div>

            <p id="conditional-msg" style="color: #888; font-size: 13px; margin: 5px 0 15px 0;"></p>
            <div id="row-sub1" class="lp-row conditional-row hidden"><div class="row-header"><span class="item-label" id="lbl-sub1">派生質問1</span><button class="mini-roll-btn" onclick="rollSingle('sub1')">🎲 Roll</button></div><select id="sel-sub1" onchange="handleMainChange()"></select></div>
            <div id="row-sub2" class="lp-row conditional-row hidden"><div class="row-header"><span class="item-label" id="lbl-sub2">派生質問2</span><button class="mini-roll-btn" onclick="rollSingle('sub2')">🎲 Roll</button></div><select id="sel-sub2" onchange="handleMainChange()"></select></div>
        </div>
    </div>

    <div class="block" style="margin-top: 20px; border-color: #00ff66;">
        <h2>出力テキスト</h2>
        <button onclick="copyText()" style="background-color: #00ff66; color: black; font-weight: bold; margin-bottom: 5px;">テキストをコピーする</button>
        <textarea id="memo-output" class="output-box" readonly></textarea>
    </div>
</div>

        q2: { label: "相棒がいるか、それとも一人でやってる？", dice: 2, options: ["相棒がいる", "一人でやっている"] },
        q3: { label: "おまえの“オフィス”（仕事場）はどんな感じだ？", dice: 6, options: ["そんなものはない。おまえは絶えず居場所を変えるようにしている。","地元の酒場のボックス席。","すべてのやりとりはデータプール上のメッセージと、匿名の受け渡し場所で完結する。","倉庫、店舗、クリニックなどの空き部屋。","（自分以外は近づかない）放棄された建物。","キューブ・ホテルのロビー"] },

        sub1: { label: "おまえには相棒がいるのか。どんな奴だ？", dice: 6, options: ["家族","旧友","相棒であり恋人でもある（かも知れない）","師匠","マフィアやギャングにコネのある正体不明の相棒","企業とコネのある正体不明の相棒"] }

        q2: { label: "おまえの群れは陸海空のどれだ？", dice: 3, options: ["陸","海","空"] },
        q3: { label: "群れでのおまえの役割は何だ？", dice: 6, options: ["偵察（交渉役）","強行偵察員（警備、武器）","輸送／旅客ヴィークルの運転手や操縦士","貨物輸送責任者（超大型輸送／旅客ヴィークルの運転手や操縦士）","一匹狼の密輸業者","調達（燃料やヴィークルなどを入手、維持管理する）"] },
        q4: { label: "おまえの群れの総体的な倫理観は？", dice: 6, options: ["常に善をなすべく働く。よそ者も群れに受け入れ、一緒に生きて行こうとする。","家族経営のビジネスに似ている。公正誠実を心がけた運営をしている。","過ちを犯したり、倫理に外れた行為をすることもあるが、ごく稀だ。","群れが必要とするものを手に入れる邪魔になるなら、規則を破ることも厭わない。","冷酷で自己中心的。群れの利益になるなら、悪事に手を染めることも辞さない。","完全な邪悪。ハイウェイを縦横無尽に爆走し、殺し、奪い、人々を震え上がらせる。"] },
        q5: { label: "おまえの群れを狙っているのは誰だ？", dice: 6, options: ["犯罪組織","ブースターギャング","ドラッグの売人","腐敗した政治家","同じ稼業に携わるライバルの群れ","腐敗した警官"] }
    }

// =========================================================================
// コアプログラムロジック
// =========================================================================

// 現在のアクティブな動的サブデータを保持するグローバル変数
let currentDynamicSubData = null;

function switchRole() {
    const roleId = document.getElementById('role-select').value;
    const table = masterTables[roleId];
    
    document.getElementById('main-section-title').innerText = `${table.roleName} のライフパス設定`;

    // q1 〜 q6 の表示切り替えとスロットの準備
    for (let i = 1; i <= 6; i++) {
        const row = document.getElementById(`row-q${i}`);
        const qKey = `q${i}`;
        if (table[qKey]) {
            row.classList.remove('hidden');
            setupSlot(`q${i}`, table[qKey]);
        } else {
            row.classList.add('hidden');
        }
    }

    // サブスロットの準備（NOMAD以外は通常のセットアップ）
    if (roleId !== "NOMAD") {
        currentDynamicSubData = null;
        ['sub1', 'sub2'].forEach(subKey => {
            if (table[subKey]) {
                setupSlot(subKey, table[subKey]);
            }
        });
    }

    // パネルの視覚的制御と分岐判定
    const condSection = document.getElementById('conditional-section');
    const msg = document.getElementById('conditional-msg');
    
    if (roleId === "ROCKERBOY" || roleId === "NETRUNNER" || roleId === "TECH" || roleId === "MEDTECH" || roleId === "NOMAD" || roleId === "FIXER") {
        condSection.style.opacity = "1";
        document.getElementById('conditional-title').innerText = `${table.roleName} 専用派生項目`;
        msg.innerText = "";
    } else {
        condSection.style.opacity = "0.2";
        document.getElementById('conditional-title').innerText = "派生項目なし";
        msg.innerText = `※${table.roleName}には特定の分岐条件はありません。`;
    }

    handleMainChange();
}

function setupSlot(id, data) {
    document.getElementById(`lbl-${id}`).innerText = data.label;
    const select = document.getElementById(`sel-${id}`);
    select.innerHTML = "";
    data.options.forEach((text, idx) => {
        let opt = document.createElement('option');
        opt.value = text;
        opt.innerText = `${idx + 1}: ${text}`;
        select.appendChild(opt);
    });
}

function handleMainChange() {
    const roleId = document.getElementById('role-select').value;
    const rowSub1 = document.getElementById('row-sub1');
    const rowSub2 = document.getElementById('row-sub2');

    rowSub1.classList.add('hidden');
    rowSub2.classList.add('hidden');

    if (roleId === "ROCKERBOY") {
        const isSolo = document.getElementById('sel-q2').selectedIndex === 1; // 「ソロ」
        if (isSolo) {
            rowSub1.classList.remove('hidden');
            const hasHistory = document.getElementById('sel-sub1').selectedIndex === 0; // 「ある」
            if (hasHistory) {
                rowSub2.classList.remove('hidden');
            }
        } else {
            document.getElementById('conditional-msg').innerText = "※活動形態で「ソロ」を選択すると追加項目が開放されます。";
        }
    } else if (roleId === "NETRUNNER" || roleId === "TECH" || roleId === "MEDTECH" || roleId === "FIXER") {
        const hasPartner = document.getElementById('sel-q2').selectedIndex === 0; // 「相棒がいる」
        if (hasPartner) {
            rowSub1.classList.remove('hidden');
        } else {
            document.getElementById('conditional-msg').innerText = "※「相棒がいる」を選択すると追加項目が開放されます。";
        }
    } else if (roleId === "NOMAD") {
        // ノーマッド専用の動的分岐ロジック
        rowSub1.classList.remove('hidden');
        const envIndex = document.getElementById('sel-q2').selectedIndex; // 0:陸, 1:海, 2:空
        
        let nomadSubData = { label: "", dice: 6, options: [] };
        
        if (envIndex === 0) { // 陸
            nomadSubData.label = "【陸】おまえの群れは陸で何をしている？";
            nomadSubData.dice = 10;
            nomadSubData.options = [
                "ゴーギャング（暴走族）",
                "旅客輸送",
                "文化教育集会（ショトーカ）／学校",
                "巡回興行／移動遊園地",
                "農業季節労働者",
                "貨物輸送",
                "輸送の護衛",
                "密輸",
                "傭兵団",
                "建設ワーク・ギャング"
            ];
        } else if (envIndex === 1) { // 海
            nomadSubData.label = "【海】おまえの群れは海で何をしている？";
            nomadSubData.dice = 6;
            nomadSubData.options = [
                "海賊",
                "貨物輸送",
                "旅客輸送",
                "密輸",
                "戦闘支援",
                "潜水艦戦"
            ];
        } else if (envIndex === 2) { // 空
            nomadSubData.label = "【空】おまえの群れは空で何をしている？";
            nomadSubData.dice = 6;
            nomadSubData.options = [
                "空賊",
                "貨物輸送",
                "旅客輸送",
                "航空機の護衛",
                "密輸",
                "戦闘支援"
            ];
        }
        
        currentDynamicSubData = nomadSubData;

        // 現在選択されている sub1 のインデックスを保持
        const currentSubIdx = document.getElementById('sel-sub1').selectedIndex;
        setupSlot('sub1', nomadSubData);
        // 選択肢の数に収まるならインデックスを復元、なければ0番目にする
        if (currentSubIdx >= 0 && currentSubIdx < nomadSubData.options.length) {
            document.getElementById('sel-sub1').selectedIndex = currentSubIdx;
        } else {
            document.getElementById('sel-sub1').selectedIndex = 0;
        }
    }

    updateOutputs();
}

function rollSingle(id) {
    const roleId = document.getElementById('role-select').value;
    const table = masterTables[roleId];
    
    let targetSlot;
    if (roleId === "NOMAD" && id === "sub1") {
        targetSlot = currentDynamicSubData;
    } else {
        targetSlot = table[id];
    }
    
    if (!targetSlot) return;

    const rolledIdx = Math.floor(Math.random() * targetSlot.dice);
    document.getElementById(`sel-${id}`).selectedIndex = rolledIdx;
    
    handleMainChange();
}

function rollAll() {
    const roleId = document.getElementById('role-select').value;
    const table = masterTables[roleId];
    
    for (let i = 1; i <= 6; i++) {
        if (table[`q${i}`]) {
            const rolledIdx = Math.floor(Math.random() * table[`q${i}`].dice);
            document.getElementById(`sel-q${i}`).selectedIndex = rolledIdx;
        }
    }

    // 動的型ではない通常のsubロール
    if (roleId !== "NOMAD") {
        if (table.sub1) {
            document.getElementById('sel-sub1').selectedIndex = Math.floor(Math.random() * table.sub1.dice);
        }
        if (table.sub2) {
            document.getElementById('sel-sub2').selectedIndex = Math.floor(Math.random() * table.sub2.dice);
        }
    } else {
        // NOMADの一括ロール時の動的サブ処理
        if (currentDynamicSubData) {
            document.getElementById('sel-sub1').selectedIndex = Math.floor(Math.random() * currentDynamicSubData.dice);
        }
    }
    
    handleMainChange();
}

function updateOutputs() {
    const roleId = document.getElementById('role-select').value;
    const table = masterTables[roleId];
    if(!document.getElementById('sel-q1').value) return;

    let out = `【${table.roleName}】\n`;
    
    // 質問を順番に出力し、紐づく派生項目があればその場で直下に挿入する
    for (let i = 1; i <= 6; i++) {
        if (!table[`q${i}`]) continue;

        // メイン質問の出力
        out += `・${table[`q${i}`].label}: ${document.getElementById(`sel-q${i}`).value}\n`;

        // --- 派生質問の動的挿入ロジック ---
        
        // 【分岐A】質問2 (q2) の直下に紐づく処理
        if (i === 2) {
            const rowSub1 = document.getElementById('row-sub1');
            const rowSub2 = document.getElementById('row-sub2');

            // 1. ロッカーボーイの場合
            if (roleId === "ROCKERBOY" && !rowSub1.classList.contains('hidden')) {
                out += `  ┗ ${table.sub1.label}: ${document.getElementById('sel-sub1').value}\n`;
                if (!rowSub2.classList.contains('hidden')) {
                    out += `    ┗ ${table.sub2.label}: ${document.getElementById('sel-sub2').value}\n`;
                }
            }
            // 2. ネットランナー、テク、メドテク、フィクサーの場合（相棒の項目）
            else if ((roleId === "NETRUNNER" || roleId === "TECH" || roleId === "MEDTECH" || roleId === "FIXER") && !rowSub1.classList.contains('hidden')) {
                out += `  ┗ ${table.sub1.label}: ${document.getElementById('sel-sub1').value}\n`;
            }
            // 3. ノーマッドの場合（陸・海・空の活動内容）
            else if (roleId === "NOMAD" && !rowSub1.classList.contains('hidden') && currentDynamicSubData) {
                out += `  ┗ ${currentDynamicSubData.label}: ${document.getElementById('sel-sub1').value}\n`;
            }
        }
    }

    document.getElementById('memo-output').value = out;
}

function copyText() {
    const textArea = document.getElementById('memo-output');
    if(!textArea.value) return;
    textArea.select();
    document.execCommand('copy');
    alert('コピーしました！');
}

window.onload = function() { switchRole(); };
</script>
